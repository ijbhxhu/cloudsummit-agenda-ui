    const colorPalette = ['#24788f', '#c06b4f', '#5f4c9c', '#3b8f5d', '#b77d27', '#7b5a43'];

    function inferTags(title) {
      const tags = [];
      const rules = [
        ['AI Agent', /(Agentic|Agent|智能體|代理|Multi-Agent|A2A)/i],
        ['Cloud Security', /(資安|防禦|Security|Zero Trust|ZTA|漏洞|韌性|信任)/i],
        ['DevOps', /(DevOps|CI\/CD|GitOps|Terraform|IaC|流程|維運)/i],
        ['Data', /(資料|數據|Database|MSSQL|SQL|觀測|可觀測|Data)/i],
        ['Kubernetes', /(Kubernetes|K8s)/i],
        ['FinOps', /(FinOps|成本|閒置|碳管理)/i],
        ['Governance', /(治理|合規|法遵|ISO|TIPS|治理)/i],
        ['Cloud', /(Cloud|GCP|Azure|AWS|雲端|雲地|多雲|混合雲)/i],
      ];
      for (const [tag, rx] of rules) { if (rx.test(title)) tags.push(tag); }
      return [...new Set(tags)].slice(0, 3);
    }

    function colorFor(text) {
      let hash = 0;
      for (let i = 0; i < text.length; i++) hash = (hash * 31 + text.charCodeAt(i)) >>> 0;
      return colorPalette[hash % colorPalette.length];
    }

    function buildSummary(items) {
      const tagCount = new Map();
      items.forEach((item) => inferTags(item.title).forEach((tag) => tagCount.set(tag, (tagCount.get(tag) || 0) + 1)));
      return [...tagCount.entries()].sort((a,b) => b[1] - a[1]).slice(0, 4).map(([tag, count]) => `${tag} · ${count}`);
    }

    function renderStats() {
      const sessionCount = agenda.reduce((sum, block) => sum + block.items.length, 0);
      const roomCount = new Set(agenda.flatMap((block) => block.items.map((item) => item.room))).size;
      const themes = buildSummary(agenda.flatMap((block) => block.items));
      const statsData = [
        ['時段', `${agenda.length} 個`],
        ['議程', `${sessionCount} 場`],
        ['會議室', `${roomCount} 個`],
      ];
      stats.innerHTML = statsData.map(([label, value]) => `<div class="stat"><strong>${value}</strong><span>${label}</span></div>`).join('');
      themeChips.innerHTML = themes.map((t) => `<span class="chip">${t}</span>`).join('');
      themeBox.innerHTML = themeNames.map((t) => `<span class="theme">${t}</span>`).join('');
    }

    function renderTimeNav() {
      timeNav.innerHTML = agenda.map((block) => `<a class="time-chip" href="#${slugify(block.time)}"><span>${block.time}</span><span>${block.items.length}</span></a>`).join('');
    }

    function slugify(text) {
      return text.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/(^-|-$)/g, '');
    }

    function matches(item, query) {
      if (!query) return true;
      const haystack = `${item.title} ${item.room} ${inferTags(item.title).join(' ')}`.toLowerCase();
      return haystack.includes(query);
    }

    function parseTimeToMinutes(time) {
      const [start] = time.split(' - ');
      const [hour, minute] = start.split(':').map(Number);
      return hour * 60 + minute;
    }

          const url = new URL(window.location.href);
          url.searchParams.set('v', latestVersion);
          window.location.replace(url.toString());
          return false;
        }
        const currentVersion = new URLSearchParams(window.location.search).get('v');
        if (currentVersion !== BUILD_VERSION) {
          const url = new URL(window.location.href);
          url.searchParams.set('v', BUILD_VERSION);
          window.history.replaceState({}, '', url.toString());
        }
      } catch (error) {
        const currentVersion = new URLSearchParams(window.location.search).get('v');
        if (currentVersion !== BUILD_VERSION) {
          const url = new URL(window.location.href);
          url.searchParams.set('v', BUILD_VERSION);
          window.history.replaceState({}, '', url.toString());
        }
      }
      return true;
    }

    function getTaipeiClock() {
      const parts = new Intl.DateTimeFormat('en-CA', {
        timeZone: 'Asia/Taipei',
        hour: '2-digit',
        minute: '2-digit',
        hour12: false,
        year: 'numeric',
        month: '2-digit',
        day: '2-digit',
      }).formatToParts(new Date());
      const map = Object.fromEntries(parts.filter((part) => part.type !== 'literal').map((part) => [part.type, part.value]));
      return {
        date: `${map.year}-${map.month}-${map.day}`,
        minutes: Number(map.hour) * 60 + Number(map.minute),
      };
    }

    function getVisibleBlocks(query) {
      return agenda
        .map((block) => ({
          ...block,
          items: block.items.filter((item) => matches(item, query)),
        }))
        .filter((block) => block.items.length > 0);
    }

    function pickNowAndNext(blocks) {
      if (!blocks.length) return { current: null, next: null };
      const clock = getTaipeiClock();
      const eventDate = '2026-07-01';
      const blocksWithMinutes = blocks.map((block) => ({ ...block, startMinutes: parseTimeToMinutes(block.time) }));
      if (clock.date < eventDate) {
        return { current: blocksWithMinutes[0], next: blocksWithMinutes[1] || blocksWithMinutes[0] };
      }
      if (clock.date > eventDate) {
        return { current: blocksWithMinutes[blocksWithMinutes.length - 1], next: blocksWithMinutes[blocksWithMinutes.length - 1] };
      }
      const now = Number.isFinite(clock.minutes) ? clock.minutes : blocksWithMinutes[0].startMinutes;
      let currentIndex = 0;
      for (let index = 0; index < blocksWithMinutes.length; index += 1) {
        if (now >= blocksWithMinutes[index].startMinutes) {
          currentIndex = index;
        } else {
          break;
        }
      }
      return {
        current: blocksWithMinutes[currentIndex],
        next: blocksWithMinutes[currentIndex + 1] || blocksWithMinutes[currentIndex],
      };
    }

    function updateBackTop() {
      if (window.scrollY > 420) {
        backTop.classList.add('visible');
      } else {
        backTop.classList.remove('visible');
      }
    }

    function renderAgenda() {
      const query = search.value.trim().toLowerCase();
      agendaRoot.innerHTML = '';
      const visibleBlocks = getVisibleBlocks(query);

      for (const block of visibleBlocks) {
        const items = block.items;
        const section = document.createElement('section');
        section.className = 'section';
        section.id = slugify(block.time);
        const themeSummary = buildSummary(items).join(' · ');
        section.innerHTML = `
          <div class="section-head">
            <div>
              <h2>${block.time}</h2>
              <p class="sub">${block.room} / ${block.level} / ${items.length} 場</p>
            </div>
            <p class="sub">${themeSummary}</p>
          </div>
          <div class="grid">
            ${items.map((item) => {
              const tags = inferTags(item.title);
              const accent = colorFor(item.title);
              return `<article class="session" style="--bar:${accent}">
                <div class="meta">
                  <span class="room">${item.room}</span>
                  <span class="level">${block.level}</span>
                </div>
                <h3 class="title">${item.title}</h3>
                <div class="notes">${tags.map((tag) => `<span class="note">${tag}</span>`).join('')}</div>
              </article>`;
            }).join('')}
          </div>
        `;
        agendaRoot.appendChild(section);
        if (!firstVisible) firstVisible = items[0];
      }

      if (!agendaRoot.children.length) {
        agendaRoot.innerHTML = '<section class="section"><h2>沒有找到符合的議程</h2><p class="sub">請換個關鍵字，例如 AI、資安、DevOps、Kubernetes。</p></section>';
        nextUp.innerHTML = '<p class="big">沒有結果</p><p class="sub">試試其他搜尋字詞。</p>';
        return;
      }

      const spotlightSet = visibleBlocks.flatMap((block) => block.items.map((item) => ({ block, item })));
      const { current, next } = pickNowAndNext(visibleBlocks);
      const currentItem = current?.items[0] || spotlightSet[0]?.item;
      const nextItem = next?.items[0] || spotlightSet[1]?.item || spotlightSet[0]?.item;
      const currentLabel = current && current.time === next?.time ? '目前這場' : '目前這段';
      const nextLabel = next && next.time === current?.time ? '下一場' : '下一場';
      nextUp.innerHTML = `
        <div class="callout">
          <div class="eyebrow">${currentLabel}</div>
          <p class="big">${current ? current.time : spotlightSet[0].block.time}</p>
          <p style="margin:10px 0 6px;font-weight:700;">${currentItem.title}</p>
          <p style="margin:0;color:#4e426d;">${currentItem.room} · ${current ? current.level : visibleBlocks[0].level}</p>
        </div>
        <div class="callout" style="background:rgba(36,120,143,0.08);border-color:rgba(36,120,143,0.14);color:#174e5e;">
          <div class="eyebrow">${nextLabel}</div>
          <p style="margin:10px 0 6px;font-weight:700;">${nextItem.title}</p>
          <p style="margin:0;opacity:.86;">${next ? next.time : current.time} · ${nextItem.room}</p>
        </div>
      `;
    }

    async function start() {
      const isFresh = await ensureFreshBuild();
      if (!isFresh) return;
      search.addEventListener('input', renderAgenda);
      window.addEventListener('scroll', updateBackTop, { passive: true });
      backTop.addEventListener('click', () => setTimeout(updateBackTop, 0));
      renderStats();
      renderTimeNav();
      renderAgenda();
      updateBackTop();
      setInterval(renderAgenda, 60 * 1000);
    }

    start();
  </script>
</body>
